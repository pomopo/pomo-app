name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pomoapp-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # ESLint + reviewdog
      - name: Run ESLint with reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: "."
          workdir: pomoapp-frontend

      # Prettier + reviewdog
      - name: Run Prettier with reviewdog
        uses: reviewdog/action-prettier@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          prettier_flags: "--check ."
          workdir: pomoapp-frontend

      # Vitest (そのまま)
      - name: Run Vitest
        run: |
          echo "🧪 Running tests with Vitest..."
          npm run test || (echo "❌ Vitest failed" && exit 1)
          echo "✅ All tests passed"

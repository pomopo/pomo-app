name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pomoapp-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          echo "🔍 Running ESLint..."
          npm run lint || (echo "❌ ESLint error detected" && exit 1)
          echo "✅ ESLint passed with no issues"

      - name: Run Prettier check
        run: |
          echo "🔍 Running Prettier check..."
          npm run format:check || (echo "❌ Code style issues found by Prettier" && exit 1)
          echo "✅ Prettier check passed with no issues"

      - name: Run Vitest
        run: |
          echo "🧪 Running tests with Vitest..."
          npm run test || (echo "❌ Vitest failed" && exit 1)
          echo "✅ All tests passed"

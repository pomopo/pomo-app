name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pomoapp-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          echo "🔍 Running ESLint..."
          npm run lint > eslint.log 2>&1
        continue-on-error: true
        id: eslint

      - name: Run Prettier check
        run: |
          echo "🔍 Running Prettier check..."
          npm run format:check > prettier.log 2>&1
        continue-on-error: true
        id: prettier

      - name: Run Vitest
        run: |
          echo "🧪 Running tests with Vitest..."
          npm run test > vitest.log 2>&1
        continue-on-error: true
        id: vitest

      - name: Create PR comment body
        if: github.event_name == 'pull_request'
        run: |
          echo "### 🛠️ CI 実行結果" > comment.md
          echo "- ESLint: \`${{ steps.eslint.outcome }}\`" >> comment.md
          echo "- Prettier: \`${{ steps.prettier.outcome }}\`" >> comment.md
          echo "- Vitest: \`${{ steps.vitest.outcome }}\`" >> comment.md
          echo "" >> comment.md

          echo "#### 📝 ESLint 出力 (最大100行)" >> comment.md
          echo '```' >> comment.md
          head -n 100 eslint.log >> comment.md
          echo '```' >> comment.md

          echo "" >> comment.md
          echo "#### 📝 Prettier 出力 (最大100行)" >> comment.md
          echo '```' >> comment.md
          head -n 100 prettier.log >> comment.md
          echo '```' >> comment.md

          echo "" >> comment.md
          echo "#### 🧪 Vitest 出力 (最大100行)" >> comment.md
          echo '```' >> comment.md
          head -n 100 vitest.log >> comment.md
          echo '```' >> comment.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md || echo "⚠️ gh CLI failed to comment"
